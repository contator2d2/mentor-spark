server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy para o backend específico no EasyPanel
  location /api/ {
    proxy_pass https://blaster-mentorflor-backend.isyhhh.easypanel.host/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host blaster-mentorflor-backend.isyhhh.easypanel.host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Resolver para evitar erro de host not found se o IP mudar
    resolver 8.8.8.8 valid=30s;
  }

  # Arquivos enviados pelo usuário (ex.: imagem hero da página de vendas)
  location /uploads/ {
    proxy_pass https://blaster-mentorflor-backend.isyhhh.easypanel.host/uploads/;
    proxy_http_version 1.1;
    proxy_set_header Host blaster-mentorflor-backend.isyhhh.easypanel.host;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    expires 30d;
    add_header Cache-Control "public, max-age=2592000";
    resolver 8.8.8.8 valid=30s;
  }

  # Proxy para assets hospedados no CDN do Lovable (/__l5e/assets-v1/...)
  # Sem isso, em produção self-hosted o Nginx cai no fallback do SPA e retorna
  # index.html no lugar da imagem, causando erro ao exibir <img src="/__l5e/...">.
  location /__l5e/ {
    proxy_pass https://id-preview--e4411f93-7e6a-4f97-9441-3f6ff2ddf2fb.lovable.app/__l5e/;
    proxy_http_version 1.1;
    proxy_set_header Host id-preview--e4411f93-7e6a-4f97-9441-3f6ff2ddf2fb.lovable.app;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    proxy_ssl_server_name on;
    expires 1y;
    add_header Cache-Control "public, immutable";
    resolver 8.8.8.8 valid=30s;
  }

  # SPA fallback — todas as rotas caem no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo para assets versionados
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
