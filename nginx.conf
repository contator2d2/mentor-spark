server {
  listen 80;
  server_name _;
  root /usr/share/nginx/html;
  index index.html;

  # Proxy para o backend específico no EasyPanel
  location /api/ {
    proxy_pass https://blaster-mentorflor-backend.isyhhh.easypanel.host/api/;
    proxy_http_version 1.1;
    proxy_set_header Upgrade $http_upgrade;
    proxy_set_header Connection 'upgrade';
    proxy_set_header Host blaster-mentorflor-backend.isyhhh.easypanel.host;
    proxy_cache_bypass $http_upgrade;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    proxy_set_header X-Forwarded-Proto $scheme;
    
    # Resolver para evitar erro de host not found se o IP mudar
    resolver 8.8.8.8 valid=30s;
  }

  # SPA fallback — todas as rotas caem no index.html
  location / {
    try_files $uri $uri/ /index.html;
  }

  # Cache agressivo para assets versionados
  location /assets/ {
    expires 1y;
    add_header Cache-Control "public, immutable";
  }

  gzip on;
  gzip_types text/plain text/css application/json application/javascript text/xml application/xml application/xml+rss text/javascript;
}
